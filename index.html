<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Suivi Bancaire</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #9ca3af;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --accent: #6366f1;
            --orange: #f59e0b;
            --tab-height: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== DESKTOP LAYOUT ===== */
        @media (min-width: 901px) {
            body { padding: 1.5rem; }
            .mobile-tabs { display: none !important; }
            .tab-section { display: block !important; }

            h1 {
                text-align: center;
                font-size: 1.8rem;
                margin-bottom: 1.5rem;
                color: var(--accent);
            }

            .dashboard {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
                margin-bottom: 1.5rem;
                max-width: 900px;
                margin-left: auto;
                margin-right: auto;
            }

            .main-grid {
                display: grid;
                grid-template-columns: 350px 1fr;
                gap: 1.5rem;
                max-width: 1200px;
                margin: 0 auto;
            }

            .left-panel { display: flex; flex-direction: column; gap: 1.5rem; }
            .right-panel { display: flex; flex-direction: column; gap: 1.5rem; }
            .transaction-list { max-height: 300px; overflow-y: auto; }
            .recurring-list { max-height: 200px; overflow-y: auto; }
            .installment-list { max-height: 400px; overflow-y: auto; }
        }

        /* ===== MOBILE LAYOUT ===== */
        @media (max-width: 900px) {
            body {
                padding: 0;
                padding-bottom: calc(var(--tab-height) + 10px);
            }

            h1 {
                text-align: center;
                font-size: 1.4rem;
                padding: 1rem 1rem 0.5rem;
                color: var(--accent);
            }

            .dashboard {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 0.5rem;
                padding: 0.5rem 0.8rem;
            }

            .stat-card { padding: 0.8rem 0.5rem; }
            .stat-card .value { font-size: 1.1rem; }
            .stat-card .label { font-size: 0.75rem; }

            .main-grid {
                display: block;
                padding: 0 0.8rem;
            }

            .left-panel, .right-panel { display: contents; }

            .tab-section { display: none; }
            .tab-section.active { display: block; }

            .transaction-list { max-height: none; overflow-y: auto; }
            .recurring-list { max-height: none; overflow-y: auto; }
            .installment-list { max-height: none; overflow-y: auto; }

            .mobile-tabs {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: var(--tab-height);
                background: var(--card);
                border-top: 1px solid var(--border);
                display: flex;
                justify-content: space-around;
                align-items: center;
                z-index: 1000;
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }

            .mobile-tabs button {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.2rem;
                background: none;
                border: none;
                color: var(--muted);
                font-size: 0.65rem;
                padding: 0.4rem 0;
                cursor: pointer;
                transition: color 0.2s;
                -webkit-tap-highlight-color: transparent;
            }

            .mobile-tabs button.active { color: var(--accent); }

            .mobile-tabs button svg {
                width: 22px;
                height: 22px;
                stroke: currentColor;
                fill: none;
                stroke-width: 1.8;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .mobile-tabs button .tab-label { font-weight: 500; }
        }

        /* ===== COMMON STYLES ===== */
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
        }

        .stat-card .label { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.3rem; }
        .stat-card .value { font-size: 1.6rem; font-weight: 700; }
        .stat-card .value.positive { color: var(--green); }
        .stat-card .value.negative { color: var(--red); }
        .stat-card .value.neutral { color: var(--blue); }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--muted);
        }

        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .type-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .type-toggle button {
            flex: 1;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--muted);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .type-toggle button.active-income {
            background: rgba(34, 197, 94, 0.15);
            border-color: var(--green);
            color: var(--green);
        }

        .type-toggle button.active-expense {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--red);
            color: var(--red);
        }

        .btn-add {
            width: 100%;
            padding: 0.7rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-add:hover { opacity: 0.85; }

        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .filter-bar button {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--muted);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .filter-bar button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .transaction-list::-webkit-scrollbar,
        .recurring-list::-webkit-scrollbar,
        .installment-list::-webkit-scrollbar { width: 4px; }
        .transaction-list::-webkit-scrollbar-track,
        .recurring-list::-webkit-scrollbar-track,
        .installment-list::-webkit-scrollbar-track { background: transparent; }
        .transaction-list::-webkit-scrollbar-thumb,
        .recurring-list::-webkit-scrollbar-thumb,
        .installment-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .tx-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--border);
        }
        .tx-item:last-child { border-bottom: none; }
        .tx-info { flex: 1; }
        .tx-info .tx-desc { font-size: 0.9rem; font-weight: 500; }
        .tx-info .tx-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
        .tx-amount { font-weight: 700; font-size: 0.95rem; margin-right: 0.8rem; }
        .tx-amount.income { color: var(--green); }
        .tx-amount.expense { color: var(--red); }

        .btn-delete {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.2rem;
            transition: color 0.2s;
        }
        .btn-delete:hover { color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .rec-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .rec-item:last-child { border-bottom: none; }
        .rec-info { flex: 1; }
        .rec-info .rec-desc { font-size: 0.85rem; font-weight: 500; }
        .rec-info .rec-meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }
        .rec-amount { font-weight: 700; font-size: 0.85rem; color: var(--red); margin-right: 0.6rem; }

        .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 0.1rem 0.45rem;
            border-radius: 10px;
            margin-left: 0.4rem;
            vertical-align: middle;
        }

        .rec-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.8rem;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            margin-top: 0.8rem;
            font-size: 0.85rem;
        }
        .rec-total .rec-total-label { color: var(--muted); }
        .rec-total .rec-total-value { color: var(--red); font-weight: 700; }

        /* ===== INSTALLMENT STYLES ===== */
        .inst-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
        }

        .inst-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .inst-header-left { flex: 1; }

        .inst-desc {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .inst-meta {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.15rem;
        }

        .inst-total-amount {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--red);
            white-space: nowrap;
            margin-left: 0.5rem;
        }

        .inst-progress {
            margin: 0.5rem 0;
        }

        .inst-progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .inst-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .inst-progress-fill.complete { background: var(--green); }
        .inst-progress-fill.ongoing { background: var(--orange); }

        .inst-progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.3rem;
        }

        .inst-progress-text .paid { color: var(--green); }
        .inst-progress-text .remaining { color: var(--orange); }

        .inst-next {
            font-size: 0.72rem;
            color: var(--accent);
            margin-top: 0.3rem;
        }

        .inst-done {
            font-size: 0.8rem;
            color: var(--green);
            font-weight: 600;
            margin-top: 0.3rem;
        }

        .inst-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>
    <h1>Suivi Bancaire</h1>

    <!-- TAB: Dashboard -->
    <div class="tab-section active" id="tab-dashboard">
        <div class="dashboard">
            <div class="stat-card">
                <div class="label">Solde</div>
                <div class="value neutral" id="balance">0,00 &euro;</div>
            </div>
            <div class="stat-card">
                <div class="label">Revenus</div>
                <div class="value positive" id="totalIncome">0,00 &euro;</div>
            </div>
            <div class="stat-card">
                <div class="label">D&eacute;penses</div>
                <div class="value negative" id="totalExpense">0,00 &euro;</div>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div class="left-panel">
            <!-- TAB: Ajouter -->
            <div class="tab-section" id="tab-add">
                <div class="card">
                    <h2>Nouvelle transaction</h2>
                    <div class="type-toggle">
                        <button id="btnIncome" class="active-income" onclick="setType('income')">Revenu</button>
                        <button id="btnExpense" onclick="setType('expense')">D&eacute;pense</button>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="desc" placeholder="Ex: Courses Carrefour">
                    </div>
                    <div class="form-group">
                        <label>Montant (&euro;)</label>
                        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Cat&eacute;gorie</label>
                        <select id="category"></select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date">
                    </div>
                    <button class="btn-add" onclick="addTransaction()">Ajouter</button>
                </div>
            </div>

            <!-- TAB: Prélèvements -->
            <div class="tab-section" id="tab-recurring">
                <div class="card">
                    <h2>Pr&eacute;l&egrave;vements fixes <span class="badge" id="recCount">0</span></h2>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="recDesc" placeholder="Ex: Loyer, Netflix...">
                    </div>
                    <div class="form-group">
                        <label>Montant (&euro;)</label>
                        <input type="number" id="recAmount" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Cat&eacute;gorie</label>
                        <select id="recCategory">
                            <option>Logement</option>
                            <option>Factures</option>
                            <option>Transport</option>
                            <option>Loisirs</option>
                            <option>Sant&eacute;</option>
                            <option>Shopping</option>
                            <option>Alimentation</option>
                            <option>Autres</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Jour du mois (1-28)</label>
                        <input type="number" id="recDay" min="1" max="28" value="1">
                    </div>
                    <button class="btn-add" onclick="addRecurring()">Ajouter le pr&eacute;l&egrave;vement</button>
                    <div class="recurring-list" id="recList" style="margin-top: 0.8rem;">
                        <div class="empty-state" style="padding: 1rem;">Aucun pr&eacute;l&egrave;vement</div>
                    </div>
                    <div class="rec-total" id="recTotal" style="display:none;">
                        <span class="rec-total-label">Total mensuel</span>
                        <span class="rec-total-value" id="recTotalValue">0,00 &euro;</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <!-- TAB: Paiement en plusieurs fois -->
            <div class="tab-section" id="tab-installments">
                <div class="card">
                    <h2>Paiement en plusieurs fois <span class="badge" id="instCount">0</span></h2>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="instDesc" placeholder="Ex: T&eacute;l&eacute;phone, Machine &agrave; laver...">
                    </div>
                    <div class="form-group">
                        <label>Montant total (&euro;)</label>
                        <input type="number" id="instTotal" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre de mensualit&eacute;s</label>
                            <input type="number" id="instCount_input" min="2" max="60" value="3" placeholder="3">
                        </div>
                        <div class="form-group">
                            <label>Jour de pr&eacute;l&egrave;vement</label>
                            <input type="number" id="instDay" min="1" max="28" value="1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Date du 1er pr&eacute;l&egrave;vement</label>
                        <input type="date" id="instStartDate">
                    </div>
                    <div class="form-group">
                        <label>Cat&eacute;gorie</label>
                        <select id="instCategory">
                            <option>Shopping</option>
                            <option>Logement</option>
                            <option>Factures</option>
                            <option>Transport</option>
                            <option>Loisirs</option>
                            <option>Sant&eacute;</option>
                            <option>Autres</option>
                        </select>
                    </div>
                    <!-- Preview -->
                    <div id="instPreview" style="display:none; margin-bottom: 0.8rem; padding: 0.6rem 0.8rem; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 8px; font-size: 0.82rem;">
                        <div style="color: var(--muted); margin-bottom: 0.2rem;">Aper&ccedil;u</div>
                        <div id="instPreviewText" style="color: var(--text); font-weight: 600;"></div>
                    </div>
                    <button class="btn-add" onclick="addInstallment()">Ajouter le paiement</button>
                    <div class="installment-list" id="instList" style="margin-top: 0.8rem;">
                        <div class="empty-state" style="padding: 1rem;">Aucun paiement en cours</div>
                    </div>
                </div>
            </div>

            <!-- TAB: Historique -->
            <div class="tab-section" id="tab-history">
                <div class="card">
                    <h2>Transactions</h2>
                    <div class="filter-bar">
                        <button class="active" onclick="setFilter('all', this)">Tout</button>
                        <button onclick="setFilter('income', this)">Revenus</button>
                        <button onclick="setFilter('expense', this)">D&eacute;penses</button>
                    </div>
                    <div class="transaction-list" id="txList">
                        <div class="empty-state">Aucune transaction</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile tab bar -->
    <nav class="mobile-tabs" id="mobileTabBar">
        <button class="active" onclick="switchTab('dashboard', this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="tab-label">Solde</span>
        </button>
        <button onclick="switchTab('add', this)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="tab-label">Ajouter</span>
        </button>
        <button onclick="switchTab('recurring', this)">
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.22-8.56"/><polyline points="21 3 21 9 15 9"/></svg>
            <span class="tab-label">Pr&eacute;l&egrave;v.</span>
        </button>
        <button onclick="switchTab('installments', this)">
            <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="7" y1="15" x2="13" y2="15"/></svg>
            <span class="tab-label">X fois</span>
        </button>
        <button onclick="switchTab('history', this)">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span class="tab-label">Historique</span>
        </button>
    </nav>

    <script>
        const CATEGORIES = {
            income: ['Salaire', 'Freelance', 'Autres revenus'],
            expense: ['Alimentation', 'Transport', 'Logement', 'Loisirs', 'Sant\u00e9', 'Shopping', 'Factures', 'Autres']
        };

        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
        let recurring = JSON.parse(localStorage.getItem('recurring') || '[]');
        let installments = JSON.parse(localStorage.getItem('installments') || '[]');
        let currentType = 'income';
        let currentFilter = 'all';

        // ===== MOBILE TAB NAVIGATION =====
        function isMobile() { return window.innerWidth <= 900; }

        function switchTab(tabName, btn) {
            if (!isMobile()) return;
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('tab-' + tabName);
            if (target) target.classList.add('active');
            if (tabName !== 'dashboard') {
                document.getElementById('tab-dashboard').classList.add('active');
            }
            document.querySelectorAll('.mobile-tabs button').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            window.scrollTo(0, 0);
        }

        // ===== FORM FUNCTIONS =====
        function setType(type) {
            currentType = type;
            document.getElementById('btnIncome').className = type === 'income' ? 'active-income' : '';
            document.getElementById('btnExpense').className = type === 'expense' ? 'active-expense' : '';
            updateCategorySelect();
        }

        function updateCategorySelect() {
            const sel = document.getElementById('category');
            sel.innerHTML = CATEGORIES[currentType].map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTransactions();
        }

        function save() { localStorage.setItem('transactions', JSON.stringify(transactions)); }
        function saveRecurring() { localStorage.setItem('recurring', JSON.stringify(recurring)); }
        function saveInstallments() { localStorage.setItem('installments', JSON.stringify(installments)); }

        // ===== RECURRING =====
        function addRecurring() {
            const desc = document.getElementById('recDesc').value.trim();
            const amount = parseFloat(document.getElementById('recAmount').value);
            const category = document.getElementById('recCategory').value;
            const day = parseInt(document.getElementById('recDay').value);
            if (!desc || isNaN(amount) || amount <= 0 || isNaN(day) || day < 1 || day > 28) return;

            recurring.push({ id: Date.now(), desc, amount, category, day });
            saveRecurring();
            renderRecurring();
            applyRecurring();
            document.getElementById('recDesc').value = '';
            document.getElementById('recAmount').value = '';
            document.getElementById('recDay').value = '1';
        }

        function deleteRecurring(id) {
            recurring = recurring.filter(r => r.id !== id);
            saveRecurring();
            renderRecurring();
        }

        function renderRecurring() {
            const list = document.getElementById('recList');
            document.getElementById('recCount').textContent = recurring.length;
            if (recurring.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 1rem;">Aucun pr\u00e9l\u00e8vement</div>';
                document.getElementById('recTotal').style.display = 'none';
                return;
            }
            list.innerHTML = recurring.map(r => `
                <div class="rec-item">
                    <div class="rec-info">
                        <div class="rec-desc">${escapeHtml(r.desc)}</div>
                        <div class="rec-meta">${r.category} &bull; le ${r.day} de chaque mois</div>
                    </div>
                    <div class="rec-amount">-${formatMoney(r.amount)}</div>
                    <button class="btn-delete" onclick="deleteRecurring(${r.id})" title="Supprimer">&times;</button>
                </div>
            `).join('');
            const total = recurring.reduce((s, r) => s + r.amount, 0);
            document.getElementById('recTotal').style.display = 'flex';
            document.getElementById('recTotalValue').textContent = '-' + formatMoney(total);
        }

        function applyRecurring() {
            const now = new Date();
            const currentMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            let applied = JSON.parse(localStorage.getItem('recurringApplied') || '{}');
            let changed = false;
            recurring.forEach(r => {
                const key = r.id + '_' + currentMonth;
                if (!applied[key]) {
                    const day = String(Math.min(r.day, 28)).padStart(2, '0');
                    transactions.push({
                        id: Date.now() + Math.random(),
                        type: 'expense',
                        desc: r.desc + ' (auto)',
                        amount: r.amount,
                        category: r.category,
                        date: currentMonth + '-' + day,
                        recurring: true
                    });
                    applied[key] = true;
                    changed = true;
                }
            });
            if (changed) {
                save();
                localStorage.setItem('recurringApplied', JSON.stringify(applied));
                render();
            }
        }

        // ===== INSTALLMENTS (Paiement en plusieurs fois) =====
        function updateInstPreview() {
            const total = parseFloat(document.getElementById('instTotal').value);
            const count = parseInt(document.getElementById('instCount_input').value);
            const preview = document.getElementById('instPreview');
            const previewText = document.getElementById('instPreviewText');

            if (!isNaN(total) && total > 0 && !isNaN(count) && count >= 2) {
                const monthly = total / count;
                preview.style.display = 'block';
                previewText.textContent = count + ' x ' + formatMoney(monthly) + ' = ' + formatMoney(total);
            } else {
                preview.style.display = 'none';
            }
        }

        function addInstallment() {
            const desc = document.getElementById('instDesc').value.trim();
            const total = parseFloat(document.getElementById('instTotal').value);
            const count = parseInt(document.getElementById('instCount_input').value);
            const day = parseInt(document.getElementById('instDay').value);
            const startDate = document.getElementById('instStartDate').value;
            const category = document.getElementById('instCategory').value;

            if (!desc || isNaN(total) || total <= 0 || isNaN(count) || count < 2 || count > 60 ||
                isNaN(day) || day < 1 || day > 28 || !startDate) return;

            const monthly = Math.round((total / count) * 100) / 100;
            // Adjust last payment for rounding
            const lastPayment = Math.round((total - monthly * (count - 1)) * 100) / 100;

            const inst = {
                id: Date.now(),
                desc,
                total,
                count,
                monthly,
                lastPayment,
                day,
                startDate,
                category,
                createdAt: new Date().toISOString()
            };

            installments.push(inst);
            saveInstallments();
            applyInstallments();
            renderInstallments();
            renderStats();
            renderTransactions();

            // Reset form
            document.getElementById('instDesc').value = '';
            document.getElementById('instTotal').value = '';
            document.getElementById('instCount_input').value = '3';
            document.getElementById('instStartDate').value = '';
            document.getElementById('instPreview').style.display = 'none';
        }

        function deleteInstallment(id) {
            installments = installments.filter(i => i.id !== id);
            saveInstallments();
            renderInstallments();
        }

        function getInstallmentMonths(inst) {
            // Returns array of { date: 'YYYY-MM-DD', amount, index } for each payment
            const months = [];
            const [startY, startM] = inst.startDate.split('-').map(Number);
            for (let i = 0; i < inst.count; i++) {
                let m = startM + i;
                let y = startY;
                while (m > 12) { m -= 12; y++; }
                const dayStr = String(Math.min(inst.day, 28)).padStart(2, '0');
                const monthStr = String(m).padStart(2, '0');
                const amount = (i === inst.count - 1) ? inst.lastPayment : inst.monthly;
                months.push({
                    date: y + '-' + monthStr + '-' + dayStr,
                    amount,
                    index: i + 1
                });
            }
            return months;
        }

        function applyInstallments() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            let applied = JSON.parse(localStorage.getItem('installmentsApplied') || '{}');
            let changed = false;

            installments.forEach(inst => {
                const months = getInstallmentMonths(inst);
                months.forEach(m => {
                    const key = inst.id + '_' + m.date;
                    if (!applied[key] && m.date <= todayStr) {
                        transactions.push({
                            id: Date.now() + Math.random(),
                            type: 'expense',
                            desc: inst.desc + ' (' + m.index + '/' + inst.count + ')',
                            amount: m.amount,
                            category: inst.category,
                            date: m.date,
                            installmentId: inst.id
                        });
                        applied[key] = true;
                        changed = true;
                    }
                });
            });

            if (changed) {
                save();
                localStorage.setItem('installmentsApplied', JSON.stringify(applied));
            }
        }

        function renderInstallments() {
            const list = document.getElementById('instList');
            document.getElementById('instCount').textContent = installments.length;

            if (installments.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 1rem;">Aucun paiement en cours</div>';
                return;
            }

            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const applied = JSON.parse(localStorage.getItem('installmentsApplied') || '{}');

            list.innerHTML = installments.map(inst => {
                const months = getInstallmentMonths(inst);
                let paidCount = 0;
                let paidAmount = 0;
                let nextPayment = null;

                months.forEach(m => {
                    const key = inst.id + '_' + m.date;
                    if (applied[key]) {
                        paidCount++;
                        paidAmount += m.amount;
                    } else if (!nextPayment) {
                        nextPayment = m;
                    }
                });

                const remaining = inst.total - paidAmount;
                const pct = Math.round((paidCount / inst.count) * 100);
                const isComplete = paidCount >= inst.count;
                const fillClass = isComplete ? 'complete' : 'ongoing';

                let statusHtml = '';
                if (isComplete) {
                    statusHtml = '<div class="inst-done">Termin&eacute;</div>';
                } else if (nextPayment) {
                    const d = new Date(nextPayment.date);
                    const dateStr = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
                    statusHtml = '<div class="inst-next">Prochain : ' + dateStr + ' &mdash; ' + formatMoney(nextPayment.amount) + '</div>';
                }

                return `
                    <div class="inst-item">
                        <div class="inst-header">
                            <div class="inst-header-left">
                                <div class="inst-desc">${escapeHtml(inst.desc)}</div>
                                <div class="inst-meta">${inst.category} &bull; ${inst.count}x ${formatMoney(inst.monthly)} &bull; le ${inst.day} du mois</div>
                            </div>
                            <div class="inst-total-amount">-${formatMoney(inst.total)}</div>
                        </div>
                        <div class="inst-progress">
                            <div class="inst-progress-bar">
                                <div class="inst-progress-fill ${fillClass}" style="width:${pct}%"></div>
                            </div>
                            <div class="inst-progress-text">
                                <span class="paid">${paidCount}/${inst.count} pay&eacute;es &bull; ${formatMoney(paidAmount)}</span>
                                <span class="remaining">${isComplete ? '' : 'Reste ' + formatMoney(remaining)}</span>
                            </div>
                        </div>
                        ${statusHtml}
                        <div class="inst-footer">
                            <button class="btn-delete" onclick="deleteInstallment(${inst.id})" title="Supprimer">&times;</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== COMMON =====
        function formatMoney(n) {
            return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' \u20ac';
        }

        function addTransaction() {
            const desc = document.getElementById('desc').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const date = document.getElementById('date').value;
            if (!desc || isNaN(amount) || amount <= 0 || !date) return;

            transactions.push({ id: Date.now(), type: currentType, desc, amount, category, date });
            save();
            render();
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            save();
            render();
        }

        function renderStats() {
            const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const balance = income - expense;
            document.getElementById('totalIncome').textContent = formatMoney(income);
            document.getElementById('totalExpense').textContent = formatMoney(expense);
            const balEl = document.getElementById('balance');
            balEl.textContent = formatMoney(balance);
            balEl.className = 'value ' + (balance >= 0 ? 'positive' : 'negative');
        }

        function renderTransactions() {
            const list = document.getElementById('txList');
            let filtered = [...transactions].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            if (currentFilter !== 'all') {
                filtered = filtered.filter(t => t.type === currentFilter);
            }
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">Aucune transaction</div>';
                return;
            }
            list.innerHTML = filtered.map(t => `
                <div class="tx-item">
                    <div class="tx-info">
                        <div class="tx-desc">${escapeHtml(t.desc)}</div>
                        <div class="tx-meta">${t.category} &bull; ${new Date(t.date).toLocaleDateString('fr-FR')}</div>
                    </div>
                    <div class="tx-amount ${t.type === 'income' ? 'income' : 'expense'}">
                        ${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}
                    </div>
                    <button class="btn-delete" onclick="deleteTransaction(${t.id})" title="Supprimer">&times;</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function render() {
            renderStats();
            renderTransactions();
            renderInstallments();
        }

        // ===== LIVE PREVIEW for installments =====
        document.getElementById('instTotal').addEventListener('input', updateInstPreview);
        document.getElementById('instCount_input').addEventListener('input', updateInstPreview);

        // ===== INIT =====
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        updateCategorySelect();
        renderRecurring();
        applyRecurring();
        applyInstallments();
        render();
    </script>
</body>
</html>
